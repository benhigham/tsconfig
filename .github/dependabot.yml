version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    assignees:
      - 'benhigham'
    commit-message:
      prefix: 'build'
      include: 'scope'
    groups:
      npm-minor:
        patterns:
          - '*'
        update-types:
          - 'minor'
      npm-patch:
        patterns:
          - '*'
        update-types:
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    assignees:
      - 'benhigham'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      github-actions-minor:
        patterns:
          - '*'
        update-types:
          - 'minor'
      github-actions-patch:
        patterns:
          - '*'
        update-types:
          - 'patch'
